# GitLab CI: автосборка Android (AAB + APK) на push в main или тэг.
# Запускается на self-hosted shell-runner'е на Windows (тэг `windows`).
# На машине ожидаются установленные: Flutter, JDK 17, Android SDK, Rust,
# flutter_rust_bridge_codegen, а также keystore по локальному пути.
#
# iOS — отдельно через GitHub Actions на macOS-runner'е.

stages:
  - build

variables:
  GIT_DEPTH: 10
  # Локальные пути на этой машине разработчика — сюда CI копирует keystore
  # (gitignored) перед сборкой подписанных артефактов.
  LOCAL_KEYSTORE_DIR: 'C:\Users\eskra\Downloads\stocksi-mobile\flutter-app\keystore'
  LOCAL_KEY_PROPERTIES: 'C:\Users\eskra\Downloads\stocksi-mobile\flutter-app\android\key.properties'
  JAVA_HOME: 'C:\Users\eskra\jdk\jdk-17.0.12+7'

.flutter-shared:
  tags:
    - windows
  before_script:
    # PATH с JDK для Gradle
    - $env:PATH = "$env:JAVA_HOME\bin;$env:PATH"
    - flutter --version
    - cd flutter-app
    - flutter pub get
    # FRB generated файлы уже в репо, codegen не нужен
    # Подкладываем keystore + key.properties (которые gitignored)
    - if (-not (Test-Path keystore)) { New-Item -ItemType Directory -Path keystore | Out-Null }
    - Copy-Item "$env:LOCAL_KEYSTORE_DIR\stocksi-upload.jks" "keystore\stocksi-upload.jks" -Force
    - Copy-Item "$env:LOCAL_KEY_PROPERTIES" "android\key.properties" -Force

build_aab:
  extends: .flutter-shared
  stage: build
  script:
    - flutter build appbundle --release
    - Copy-Item "build\app\outputs\bundle\release\app-release.aab" "..\Ultimate-playstore.aab" -Force
  artifacts:
    name: "ultimate-aab-$CI_COMMIT_SHORT_SHA"
    paths:
      - Ultimate-playstore.aab
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build_apk:
  extends: .flutter-shared
  stage: build
  script:
    - flutter build apk --release
    - Copy-Item "build\app\outputs\flutter-apk\app-release.apk" "..\Ultimate-release.apk" -Force
  artifacts:
    name: "ultimate-apk-$CI_COMMIT_SHORT_SHA"
    paths:
      - Ultimate-release.apk
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
