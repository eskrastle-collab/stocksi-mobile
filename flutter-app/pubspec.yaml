name: stocksi_mobile
description: Stocksi Ultimate для мобильных устройств
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.12.0
  flutter_riverpod: ^2.5.1
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_svg: ^2.0.10
  http: ^1.2.0
  flutter_html: ^3.0.0-beta.2
  url_launcher: ^6.2.5
  flutter_slidable: ^3.1.0
  share_plus: ^9.0.0
  intl: ^0.19.0
  audioplayers: ^6.1.0
  shared_preferences: ^2.2.3
  swipeable_page_route: ^0.4.3
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1
  tray_manager: ^0.2.3
  window_manager: ^0.4.2
  auto_updater: ^1.0.0
  flutter_foreground_task: ^8.10.0
  sentry_flutter: ^8.10.0
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.1
  rust_lib_stocksi_mobile:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.7

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#151F2A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#151F2A"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

# Конфиг для пакета `msix` — создание Windows installer (.msix).
# Сборка: `flutter pub run msix:create`
# По умолчанию подписывается self-signed сертификатом (генерируется автоматически).
# Для публичной раздачи нужен доверенный сертификат.
msix_config:
  display_name: Stocksi Ultimate
  publisher_display_name: Stocksi
  publisher: CN=Stocksi
  identity_name: ru.stocksi.ultimate
  msix_version: 0.1.0.0
  description: Real-time trading news
  logo_path: assets\icon\app_icon.png
  capabilities: internetClient, internetClientServer
  architecture: x64
  store: false
  certificate_path: cert\stocksi.pfx
  certificate_password: stocksi2026
  install_certificate: false

flutter:
  uses-material-design: true
  assets:
    - assets/logo_u.svg
    - assets/sounds/
    - assets/icon/
